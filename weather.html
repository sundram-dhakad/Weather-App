<!DOCTYPE html>
<html lang="en">
<head>
  <title>Weather App</title>
  <link rel="stylesheet" href="weather.css">
</head>
<body>
  <p class="heading">Find Weather Information About Any Location</p>

  <div class="input">
    <input class="address-input" type="text" placeholder="Enter Location">
    <button class="search-button">Search</button>
  </div>

  <div class="current-condition">
    <p class="currConditionHeading" >Current Condition</p>
    <div class="current-condition-info">
    </div>
  </div>

  <div class="next15">Next 15 Days Data</div>
  <div class="container">
    <div class="containerHeader">
      <div class="date-title">Date</div>
      <div>Temperature</div>
      <div>MinTemp</div>
      <div>MaxTemp</div>
      <div>Condition</div>
    </div>
    <div class="info-container">
    </div>
  </div>

  <script src="weather.js"></script>
</body>
</html>
